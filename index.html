<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kannikii</title>
    <meta
      name="description"
      content="LiquidChrome 배경을 적용한 React 기반 블로그 시작 템플릿"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isLocalhost =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      if (isLocalhost) {
        import('/src/main.jsx');
      } else {
        const jsEntry = '/assets/' + 'main.js';
        const cssEntry = '/assets/' + 'main.css';
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = cssEntry;
        document.head.appendChild(stylesheet);
        import(jsEntry);
      }
    </script>
  </body>
  </html>
